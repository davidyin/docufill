name = "docufill-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "docufill-db"
database_id = "b29e5066-29eb-4ea2-bf8d-e14bb664d95d"

# R2 Bucket (document uploads + exports)
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "docufill-documents"

[vars]
ENVIRONMENT = "production"
MAX_FILE_SIZE_MB = "10"
GEMINI_MODEL = "gemini-2.5-flash"
# Clerk JWT Issuer (derived from publishable key)
CLERK_JWT_ISSUER = "https://casual-bengal-37.clerk.accounts.dev"
CLERK_JWT_PUBLIC_KEY = ""
